<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<title>Course - Ryxa</title>
<meta name="description" content="Learn from creators on Ryxa.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Plus+Jakarta+Sans:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a14;
    --surface: #12121e;
    --surface2: #16162a;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --text: #f0eef8;
    --text-secondary: #fff;
    --muted: #b4b2c8;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --accent-glow: rgba(124,58,237,0.35);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.4); border-radius: 10px; }
  html { scrollbar-width: thin; scrollbar-color: rgba(168,85,247,0.4) var(--bg); }

  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; color: var(--muted); font-size: 14px; }
  .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 40px 24px; }

  /* Nav */
  .nav { padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: relative; }
  .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.4px; }
  .nav-logo img { width: 28px; height: 28px; border-radius: 6px; }
  .nav-right { display: flex; gap: 10px; align-items: center; }
  .nav-btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; text-decoration: none; transition: all 0.15s; }
  .nav-btn-outline { background: transparent; border: 1px solid var(--border-hover); color: var(--muted); }
  .nav-btn-outline:hover { border-color: var(--accent); color: var(--text); }
  .nav-btn-primary { background: var(--accent); color: #fff; border: none; box-shadow: 0 0 16px var(--accent-glow); }

  /* Signed-in chip */
  .signin-chip { display: none; align-items: center; gap: 8px; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border-hover); border-radius: 999px; font-size: 12px; color: var(--muted); cursor: pointer; transition: border-color 0.15s, color 0.15s; font-family: 'DM Sans', sans-serif; }
  .signin-chip:hover { border-color: var(--accent); color: var(--text); }
  .signin-chip-avatar { width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg,var(--accent),var(--accent2)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 10px; flex-shrink: 0; }
  .signin-chip-email { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .signin-popover { display: none; position: absolute; top: 62px; right: 32px; background: var(--surface); border: 1px solid var(--border-hover); border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); z-index: 50; min-width: 240px; overflow: hidden; }
  .signin-popover-email { padding: 14px 16px 12px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--muted); }
  .signin-popover-email strong { display: block; color: var(--text); font-weight: 600; margin-top: 2px; word-break: break-all; }
  .signin-popover-btn { width: 100%; padding: 11px 16px; background: transparent; border: none; color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; transition: background 0.15s; text-decoration: none; }
  .signin-popover-btn:hover { background: rgba(124,58,237,0.08); }
  .signin-popover-btn.danger { color: #fca5a5; }
  .signin-popover-btn.danger:hover { background: rgba(239,68,68,0.08); }

  /* Hero */
  .course-hero { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
  .course-cover { width: 100%; max-height: 400px; object-fit: cover; border-radius: 16px; margin-bottom: 32px; border: 1px solid var(--border); }
  .course-cover-placeholder { width: 100%; height: 240px; background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(232,121,249,0.1)); border-radius: 16px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center; font-size: 48px; border: 1px solid var(--border); }
  .course-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: clamp(28px, 5vw, 44px); font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; margin-bottom: 16px; }
  .course-creator { font-size: 14px; color: var(--text-secondary); margin-bottom: 24px; }
  .course-creator strong { color: var(--accent2); font-weight: 600; }
  .course-desc { font-size: 16px; line-height: 1.75; color: var(--text-secondary); margin-bottom: 32px; }
  /* Rich-text elements inside the description (set by the dashboard's Quill
     editor). Spacing tuned for landing-page readability. */
  .course-desc p { margin: 0 0 14px; }
  .course-desc p:last-child { margin-bottom: 0; }
  .course-desc h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); margin: 24px 0 10px; }
  .course-desc h3 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); margin: 20px 0 8px; }
  .course-desc ul, .course-desc ol { margin: 0 0 14px; padding-left: 22px; }
  .course-desc li { margin-bottom: 6px; }
  .course-desc strong { color: var(--text); font-weight: 600; }
  .course-desc a { color: var(--accent2); text-decoration: underline; }
  .course-desc a:hover { color: var(--accent); }
  /* Images inserted via the dashboard's Quill editor. The S/M/L size class
     is set in the editor and mirrors the same selectors used by the lesson
     renderer (learn/index.html). Baseline rules cap any untagged image to
     100% so a missing class doesn't blow out the column. */
  .course-desc img { max-width: 100%; height: auto; display: block; margin: 14px 0; border-radius: 8px; }
  .course-desc img.lesson-img-size-small { max-width: 30%; width: 30%; }
  .course-desc img.lesson-img-size-medium { max-width: 60%; width: 60%; }
  .course-desc img.lesson-img-size-large { max-width: 100%; width: 100%; }

  /* Buy section */
  .course-buy-card { margin-bottom: 40px; }
  .course-price { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 20px; }
  .course-price-free { color: #4ade80; }
  .course-buy-btn { width: 100%; padding: 16px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.15s; }
  .course-buy-btn:hover:not(:disabled) { opacity: 0.9; }
  .course-buy-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .course-enrolled-badge { padding: 12px 24px; background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); border-radius: 10px; color: #4ade80; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; }

  /* Curriculum */
  .course-curriculum { max-width: 720px; margin: 0 auto; padding: 0 24px 80px; }
  .curriculum-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 20px; }
  .module-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 12px; }
  .module-header { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .module-number { font-size: 11px; color: var(--accent2); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
  .lesson-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: var(--text-secondary); transition: background 0.15s; }
  .lesson-row:hover { background: rgba(124,58,237,0.04); }
  .lesson-icon { width: 20px; height: 20px; flex-shrink: 0; color: var(--muted); }
  .lesson-title { flex: 1; }
  .lesson-locked { color: var(--muted); opacity: 0.5; }
  .lesson-quiz-required { display: inline-block; padding: 2px 7px; font-size: 10px; font-weight: 600; background: rgba(124,58,237,0.12); color: var(--accent, #c4b5fd); border: 1px solid rgba(124,58,237,0.25); border-radius: 4px; letter-spacing: 0.04em; flex-shrink: 0; }

  /* Footer */
  .course-footer { text-align: center; padding: 32px; border-top: 1px solid var(--border); }
  .course-footer a { color: var(--muted); text-decoration: none; font-size: 12px; }
  .course-footer a:hover { color: var(--text); }

  @media (max-width: 640px) {
    .nav { padding: 12px 16px; }
    .signin-popover { right: 16px; }
    .signin-chip-email { max-width: 100px; }
    .course-hero { padding: 32px 16px; }
    .course-curriculum { padding: 0 16px 60px; }
    
    .course-buy-btn { width: 100%; }
  }
</style>
</head>
<body>

<nav class="nav">
  <!-- Not a link, on purpose. The wordmark is a trust signal for a buyer about
       to enter a card on an unfamiliar domain, and it puts Ryxa in front of a
       creator audience. But linking it to ryxa.io sends a buyer mid-purchase to
       a page selling the platform to creators, which is the worst possible
       destination. Keep the mark, remove the exit. -->
  <div class="nav-logo"><img src="/logo.png?v=2" alt="Ryxa"> Ryxa</div>
  <div class="nav-right">
    <button id="signin-chip" class="signin-chip" type="button" data-course-action="toggle-signin-popover">
      <span class="signin-chip-avatar" id="signin-chip-avatar">U</span>
      <span class="signin-chip-email" id="signin-chip-email"></span>
    </button>
  </div>
  <div id="signin-popover" class="signin-popover">
    <div class="signin-popover-email">
      Signed in as
      <strong id="signin-popover-email"></strong>
    </div>
    <a href="/learn/" class="signin-popover-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Ryxa Hub
    </a>
    <button class="signin-popover-btn danger" data-course-action="signout">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign out
    </button>
  </div>
</nav>

<div id="loading" class="loading">Loading course...</div>
<div id="error-page" class="error-page" style="display:none;">
  <div style="width:56px;height:56px;margin:0 auto 16px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.25);border-radius:14px;display:flex;align-items:center;justify-content:center;"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><path d="M8 7h8M8 11h6"/></svg></div>
  <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px;">Course Not Found</h1>
  <p style="color:var(--text-secondary);font-size:14px;margin-bottom:24px;">This course doesn't exist or hasn't been published yet.</p>
  <a href="/" class="nav-btn nav-btn-primary" style="text-decoration:none;">Go to Ryxa</a>
</div>

<div id="course-page" style="display:none;">
  <section class="course-hero">
    <div id="cp-cover"></div>
    <h1 class="course-title" id="cp-title"></h1>
    <div class="course-creator" id="cp-creator"></div>
    <div class="course-desc" id="cp-desc"></div>
    <div class="course-buy-card">
      <div class="course-price" id="cp-price"></div>
      <div id="cp-buy-area"></div>
    </div>
  </section>

  <section class="course-curriculum">
    <h2 class="curriculum-title">Curriculum</h2>
    <div id="cp-curriculum"></div>
  </section>
</div>

<footer class="course-footer">
  <a href="/">Powered by Ryxa</a>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.4/dist/umd/supabase.js" integrity="sha384-7SfFUrg31wOnGWBLLniKFCNmCSguYA5wI1WPDOt7kP/mom4R9/0pwghVEnv0uwYP" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.3/purify.min.js" integrity="sha512-Ll+TuDvrWDNNRnFFIM8dOiw7Go7dsHyxRp4RutiIFW/wm3DgDmCnRZow6AqbXnCbpWu93yM1O34q+4ggzGeXVA==" crossorigin="anonymous"></script>
<script src="/js/resume-intent.js"></script>
<script src="/js/course-page.js" defer></script>
<script src="/cookie-banner.js"></script>
</body>
</html>
