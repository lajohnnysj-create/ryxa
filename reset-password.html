<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="shortcut icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password. Ryxa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #07070f; --surface: #0f0f1a; --surface2: #161625;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.14);
    --accent: #7c3aed; --accent2: #a855f7; --accent-glow: rgba(124,58,237,0.3);
    --text: #f0eef8; --muted: #b4b2c8; --muted2: #c9c7dc;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scrollbar-width: thin; scrollbar-color: rgba(168,85,247,0.4) #0a0a14; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0a0a14; }
  ::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.4); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(168,85,247,0.6); }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 48px; background: rgba(10,10,15,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text); }
  .logo img { width: 38px; height: 38px; object-fit: contain; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }

  .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
  .card { background: var(--surface); border: 1px solid var(--border-hover); border-radius: 20px; padding: 48px 40px; width: 420px; max-width: 95vw; }
  .card-icon { font-size: 40px; margin-bottom: 16px; }
  .card h1 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .card p { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }
  .input {
    width: 100%; padding: 13px 16px; background: var(--bg);
    border: 1px solid var(--border-hover); border-radius: 10px;
    color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color 0.2s; margin-bottom: 12px; display: block;
  }
  .input:focus { border-color: var(--accent2); }
  .input::placeholder { color: var(--muted2); }
  .btn {
    width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .btn:hover { background: #a855f7; }
  .btn:disabled { background: var(--muted2); cursor: not-allowed; }
  .msg { font-size: 13px; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; display: none; }
  .msg.error { background: rgba(124,58,237,0.1); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.25); }
  .msg.success { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
  .back-link { text-align: center; margin-top: 20px; font-size: 13px; color: var(--muted); }
  .back-link a { color: var(--accent2); text-decoration: none; }
  .back-link a:hover { text-decoration: underline; }

  footer { border-top: 1px solid var(--border); padding: 24px 48px; text-align: center; }
  footer p { font-size: 13px; color: var(--muted); }

  /* === A11Y: visible focus ring for keyboard users === */
  *:focus-visible {
    outline: 2px solid #c4b5fd;
    outline-offset: 2px;
    border-radius: 4px;
  }
  /* === A11Y: respect reduced-motion preferences === */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html"><img src="logo.png" alt="Ryxa"> Ryxa</a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-icon">🔑</div>
    <h1>Reset your password</h1>
    <p>Enter your new password below.</p>
    <div class="msg" id="msg"></div>
    <input class="input" type="password" id="new-password" aria-label="New password" placeholder="New password" minlength="6">
    <input class="input" type="password" id="confirm-password" aria-label="Confirm new password" placeholder="Confirm new password">
    <button class="btn" id="reset-btn" onclick="resetPassword()">Update password</button>
    <div class="back-link"><a href="index.html">← Back to Ryxa</a></div>
  </div>
</div>

<footer>
  <p>© <span id="copy-year"></span> Ryxa.</p>
</footer>

<script>
document.getElementById('copy-year').textContent = new Date().getFullYear();

const SUPABASE_URL = 'https://kjytapcgxukalwsyputk.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqeXRhcGNneHVrYWx3c3lwdXRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTcxMzEsImV4cCI6MjA5MDg5MzEzMX0.VC8mcU5lUeA56kG2gHssvl88EVWr018XttA86jpfEn0';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showMsg(type, text) {
  const el = document.getElementById('msg');
  el.className = 'msg ' + type;
  el.textContent = text;
  el.style.display = 'block';
}

async function resetPassword() {
  const newPass = document.getElementById('new-password').value;
  const confirmPass = document.getElementById('confirm-password').value;
  const btn = document.getElementById('reset-btn');

  if (!newPass || newPass.length < 6) {
    showMsg('error', 'Password must be at least 6 characters.');
    return;
  }
  if (newPass !== confirmPass) {
    showMsg('error', 'Passwords do not match.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating...';

  const { error } = await sb.auth.updateUser({ password: newPass });

  if (error) {
    showMsg('error', error.message);
    btn.disabled = false;
    btn.textContent = 'Update password';
  } else {
    showMsg('success', 'Password updated successfully! Redirecting...');
    setTimeout(() => window.location.href = 'index.html', 2000);
  }
}

// Allow pressing Enter to submit
document.getElementById('confirm-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') resetPassword();
});
</script>
<script src="/cookie-banner.js"></script>
</body>
</html>
