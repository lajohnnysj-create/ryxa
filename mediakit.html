<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scrollbar-width: thin; scrollbar-color: rgba(168,85,247,0.4) #0a0a14; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #0a0a14; }
  ::-webkit-scrollbar-thumb { background: rgba(168,85,247,0.4); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(168,85,247,0.6); }

  /* All 12 themes */
  :root, [data-theme="purple"] {
    --bg: #07070f; --surface: #0f0f1a; --surface2: #161625;
    --border: rgba(255,255,255,0.1); --accent: #7c3aed; --accent2: #a855f7;
    --accent-glow: rgba(124,58,237,0.3);
    --text: #f0eef8; --muted: #b4b2c8; --muted2: #c9c7dc;
    --avatar-border: linear-gradient(135deg,#a78bfa,#e879f9);
  }
  [data-theme="midnight"] {
    --bg: #050508; --surface: #0c0c12; --surface2: #13131b;
    --border: rgba(255,255,255,0.09); --accent: #4b5563; --accent2: #9ca3af;
    --accent-glow: rgba(156,163,175,0.25);
    --text: #f3f4f6; --muted: #c9ccd4; --muted2: #dde0e6;
    --avatar-border: linear-gradient(135deg,#9ca3af,#e5e7eb);
  }
  [data-theme="sunset"] {
    --bg: #120808; --surface: #1c0e0e; --surface2: #251414;
    --border: rgba(255,180,150,0.12); --accent: #f97316; --accent2: #ec4899;
    --accent-glow: rgba(249,115,22,0.3);
    --text: #fff6f0; --muted: #f3c8b2; --muted2: #f7dcca;
    --avatar-border: linear-gradient(135deg,#fb923c,#f472b6);
  }
  [data-theme="ocean"] {
    --bg: #040a14; --surface: #0b1424; --surface2: #111d33;
    --border: rgba(150,200,255,0.12); --accent: #0891b2; --accent2: #22d3ee;
    --accent-glow: rgba(34,211,238,0.3);
    --text: #eaf6ff; --muted: #a5c8e0; --muted2: #c3dcf0;
    --avatar-border: linear-gradient(135deg,#22d3ee,#60a5fa);
  }
  [data-theme="forest"] {
    --bg: #040a06; --surface: #0b1610; --surface2: #11211a;
    --border: rgba(150,255,180,0.1); --accent: #10b981; --accent2: #34d399;
    --accent-glow: rgba(52,211,153,0.3);
    --text: #eefaf2; --muted: #a8ccb7; --muted2: #c5dfd0;
    --avatar-border: linear-gradient(135deg,#34d399,#a7f3d0);
  }
  [data-theme="rose"] {
    --bg: #140710; --surface: #1e0f1a; --surface2: #2a1624;
    --border: rgba(255,180,210,0.12); --accent: #e11d48; --accent2: #fb7185;
    --accent-glow: rgba(251,113,133,0.3);
    --text: #fff0f5; --muted: #f0bfd1; --muted2: #f7d5e0;
    --avatar-border: linear-gradient(135deg,#fb7185,#fda4af);
  }
  [data-theme="amber"] {
    --bg: #0f0a04; --surface: #1a1208; --surface2: #251b0e;
    --border: rgba(255,210,150,0.12); --accent: #d97706; --accent2: #fbbf24;
    --accent-glow: rgba(251,191,36,0.3);
    --text: #fff8ec; --muted: #e7c9a1; --muted2: #f1dcc0;
    --avatar-border: linear-gradient(135deg,#fbbf24,#fde68a);
  }
  [data-theme="crimson"] {
    --bg: #0f0405; --surface: #1a080a; --surface2: #260c10;
    --border: rgba(255,160,160,0.12); --accent: #b91c1c; --accent2: #ef4444;
    --accent-glow: rgba(239,68,68,0.3);
    --text: #fff0f0; --muted: #ecb9b9; --muted2: #f5d0d0;
    --avatar-border: linear-gradient(135deg,#ef4444,#fca5a5);
  }
  [data-theme="electric"] {
    --bg: #050814; --surface: #0b1124; --surface2: #111a38;
    --border: rgba(150,180,255,0.14); --accent: #2563eb; --accent2: #60a5fa;
    --accent-glow: rgba(96,165,250,0.35);
    --text: #eaf0ff; --muted: #a8bce0; --muted2: #c5d4ee;
    --avatar-border: linear-gradient(135deg,#60a5fa,#a5b4fc);
  }
  [data-theme="mint"] {
    --bg: #030e0c; --surface: #0a1a18; --surface2: #102623;
    --border: rgba(150,255,230,0.12); --accent: #0d9488; --accent2: #2dd4bf;
    --accent-glow: rgba(45,212,191,0.3);
    --text: #ecfefa; --muted: #a4d6cd; --muted2: #c3e4de;
    --avatar-border: linear-gradient(135deg,#2dd4bf,#a7f3d0);
  }
  [data-theme="violet"] {
    --bg: #0c0418; --surface: #170a26; --surface2: #220f37;
    --border: rgba(200,170,255,0.12); --accent: #6d28d9; --accent2: #c084fc;
    --accent-glow: rgba(192,132,252,0.3);
    --text: #f5ecff; --muted: #c9b8e6; --muted2: #dccdf0;
    --avatar-border: linear-gradient(135deg,#c084fc,#e9d5ff);
  }
  [data-theme="graphite"] {
    --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --accent: #6b7280; --accent2: #d1d5db;
    --accent-glow: rgba(209,213,219,0.2);
    --text: #f5f5f5; --muted: #b3b3b3; --muted2: #d1d1d1;
    --avatar-border: linear-gradient(135deg,#d1d5db,#f3f4f6);
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 60px 20px 40px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 50% at 50% 0%, var(--accent-glow) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 820px;
    margin: 0 auto;
  }

  /* Top action bar */
  .top-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 32px;
  }
  .btn-dl {
    padding: 10px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s, background 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-dl:hover { border-color: var(--accent2); background: var(--surface2); }
  .btn-dl svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* State */
  .state {
    text-align: center;
    padding: 80px 24px;
    color: var(--muted);
  }
  .state h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .state p { font-size: 14px; line-height: 1.6; max-width: 360px; margin: 0 auto 24px; }
  .state a.cta {
    display: inline-block;
    padding: 11px 22px;
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  /* Hero */
  .hero {
    display: flex;
    gap: 28px;
    align-items: center;
    padding: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-bottom: 20px;
  }
  .headshot-frame {
    width: 180px;
    height: 180px;
    padding: 4px;
    border-radius: 20px;
    background: var(--avatar-border);
    box-shadow: 0 0 40px var(--accent-glow);
    flex-shrink: 0;
  }
  .headshot {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }
  .headshot-fallback {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 72px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -2px;
  }
  .hero-body { flex: 1; min-width: 0; }
  .hero-name {
    font-family: 'Syne', sans-serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.8px;
    line-height: 1.1;
    margin-bottom: 6px;
    word-break: break-word;
  }
  .hero-handle {
    font-size: 14px;
    color: var(--accent2);
    font-weight: 500;
    margin-bottom: 10px;
    word-break: break-word;
  }
  .hero-category {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
    margin-bottom: 12px;
    word-break: break-word;
  }
  .hero-bio {
    font-size: 15px;
    color: var(--muted2);
    line-height: 1.6;
    word-break: break-word;
  }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 32px;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent2);
    font-weight: 700;
    margin-bottom: 18px;
  }

  /* Audience */
  .total-followers {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 16px;
  }
  .total-followers-num {
    font-family: 'Syne', sans-serif;
    font-size: 48px;
    font-weight: 800;
    letter-spacing: -1.5px;
    background: var(--avatar-border);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .total-followers-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 8px;
    font-weight: 500;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stat-card .stat-icon {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted2);
    flex-shrink: 0;
  }
  .stat-card .stat-icon svg { width: 15px; height: 15px; fill: currentColor; }
  .stat-card .stat-text { min-width: 0; }
  .stat-card .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .stat-card .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  a.stat-link {
    text-decoration: none;
    color: inherit;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
  }
  a.stat-link:hover, a.stat-link:focus-visible {
    transform: translateY(-2px);
    border-color: var(--accent2);
    background: var(--surface);
  }
  a.stat-link:hover .stat-icon, a.stat-link:focus-visible .stat-icon {
    color: var(--accent2);
  }
  .engagement-row {
    margin-top: 14px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .engagement-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }
  .engagement-value {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--accent2);
    letter-spacing: -0.3px;
  }

  /* ============================================================
     Automatic Audience (IG-pulled data) — public Media Kit
     ============================================================ */

  /* Total Followers strip — sits between hero and audience section,
     summing follower counts across all connected platforms. */
  .total-followers-strip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    text-align: center;
  }
  .total-followers-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .total-followers-value {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 800;
    color: var(--accent2);
    letter-spacing: -1px;
    line-height: 1.1;
    margin-top: 6px;
  }
  .total-followers-sub {
    font-size: 11px;
    color: var(--muted2);
    margin-top: 4px;
  }

  /* Subtle separator dot used inside the IG attribution line */
  .ig-attr-sep {
    margin: 0 6px;
    opacity: 0.6;
  }

  /* Platform tabs strip at top of Audience section */
  .ig-platform-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .ig-platform-tab {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    cursor: not-allowed;
    user-select: none;
  }
  .ig-platform-tab.is-active {
    background: var(--surface);
    color: var(--text);
    border-color: var(--accent2);
    cursor: default;
    box-shadow: 0 0 0 1px var(--accent2) inset;
  }
  .ig-platform-tab svg { width: 12px; height: 12px; flex-shrink: 0; fill: currentColor; }
  .ig-platform-soon-pill {
    font-size: 9px;
    padding: 2px 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* IG section header (handle + verified-by-IG attribution) */
  .ig-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .ig-header-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    flex-shrink: 0;
  }
  .ig-header-icon svg { width: 16px; height: 16px; fill: #fff; }
  .ig-header-body { display: flex; flex-direction: column; min-width: 0; }
  .ig-handle {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.2px;
  }
  a.ig-handle:hover { color: var(--accent2); }
  .ig-attribution {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 1px;
  }

  /* Primary stat grid */
  .ig-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
  }
  .ig-stat-card {
    padding: 14px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-align: left;
  }
  .ig-stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.4px;
    line-height: 1.1;
  }
  .ig-stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 6px;
    font-weight: 500;
  }

  /* Subsections (per-post averages, demographics) */
  .ig-subsection { margin-top: 22px; }
  .ig-subtitle {
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 12px;
  }

  /* Demographics — gender/age tabs and CSS bar charts */
  .ig-demo-grid { display: grid; grid-template-columns: 1fr; gap: 22px; }
  @media (min-width: 700px) {
    .ig-demo-grid { grid-template-columns: 1fr 1fr; gap: 28px; }
  }
  .ig-demo-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .ig-demo-block-title {
    font-size: 12px;
    color: var(--text);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .ig-demo-tabs {
    display: flex;
    gap: 4px;
    padding: 3px;
    background: var(--surface);
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .ig-demo-tab {
    flex: 1;
    padding: 6px 8px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .ig-demo-tab:hover { color: var(--text); }
  .ig-demo-tab.is-active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 1px 0 rgba(255,255,255,0.04);
  }

  /* Horizontal bar chart rows */
  .ig-bar-list { display: flex; flex-direction: column; gap: 10px; }
  .ig-bar-row { display: grid; grid-template-columns: 80px 1fr 50px; align-items: center; gap: 10px; }
  .ig-bar-label {
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ig-bar-track {
    height: 8px;
    background: var(--surface);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .ig-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #833ab4 0%, #fd1d1d 50%, #fcb045 100%);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .ig-bar-pct {
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Gender split as a single stacked bar */
  .ig-gender-split {
    display: flex;
    height: 14px;
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 10px;
    background: var(--surface);
  }
  .ig-gender-seg-male { background: #5b8def; }
  .ig-gender-seg-female { background: #ec5e92; }
  .ig-gender-seg-other { background: #a78bfa; }
  .ig-gender-legend {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--muted);
  }
  .ig-gender-legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .ig-gender-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  .ig-empty {
    padding: 24px 16px;
    text-align: center;
    color: var(--muted);
    background: var(--surface2);
    border: 1px dashed var(--border);
    border-radius: 12px;
    font-size: 13px;
  }
  .ig-note {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(252,176,69,0.06);

function buildHero(kit, headshot) {
  const name = kit.display_name || '';
  const initial = (name[0] || '?').toUpperCase();
  const headshotHtml = headshot
    ? `<img class="headshot" src="${esc(headshot)}" alt="${esc(name)}">`
    : `<div class="headshot-fallback">${esc(initial)}</div>`;
  return `<div class="hero">
    <div class="headshot-frame">${headshotHtml}</div>
    <div class="hero-body">
      <div class="hero-name">${esc(name || 'Creator')}</div>
      ${kit.handle ? `<div class="hero-handle">${esc(kit.handle)}</div>` : ''}
      ${kit.category ? `<div class="hero-category">${esc(kit.category)}</div>` : ''}
      ${kit.bio ? `<div class="hero-bio">${esc(kit.bio)}</div>` : ''}
    </div>
  </div>`;
}

function buildAudience(kit) {
  const rawSocials = kit.socials || {};
  // Normalize: legacy number-only, or {count, url}
  const normalized = {};
  for (const key of Object.keys(rawSocials)) {
    const v = rawSocials[key];
    if (typeof v === 'number') normalized[key] = { count: v, url: '' };
    else if (v && typeof v === 'object') normalized[key] = { count: parseInt(v.count) || 0, url: v.url || '' };
  }

  const filled = SOCIAL_PLATFORMS
    .map(p => ({ ...p, data: normalized[p.key] || { count: 0, url: '' } }))
    .filter(p => p.data.count > 0);

  if (filled.length === 0 && !kit.engagement_rate) return '';

  const total = filled.reduce((sum, p) => sum + p.data.count, 0);

  const totalHtml = total > 0 ? `<div class="total-followers">
    <div class="total-followers-num">${formatNumber(total)}</div>
    <div class="total-followers-label">Total Followers</div>
  </div>` : '';

  const statsHtml = filled.length > 0 ? `<div class="stats-grid">
    ${filled.map(p => {
      const inner = `<div class="stat-icon">${p.svg}</div>
      <div class="stat-text">
        <div class="stat-num">${formatNumber(p.data.count)}</div>
        <div class="stat-label">${esc(p.label)}</div>
      </div>`;
      // If URL is present and valid, wrap as a link
      const safeUrl = validExternalUrl(p.data.url);
      if (safeUrl) {
        return `<a class="stat-card stat-link" href="${esc(safeUrl)}" target="_blank" rel="noopener nofollow" aria-label="${esc(p.label)} profile">${inner}</a>`;
      }
      return `<div class="stat-card">${inner}</div>`;
    }).join('')}
  </div>` : '';

  const engagementHtml = (kit.engagement_rate && parseFloat(kit.engagement_rate) > 0) ? `<div class="engagement-row">
    <div class="engagement-label">Engagement Rate</div>
    <div class="engagement-value">${parseFloat(kit.engagement_rate).toFixed(2)}%</div>
  </div>` : '';

  return `<div class="section">
    <div class="section-title">Audience</div>
    ${totalHtml}
    ${statsHtml}
    ${engagementHtml}
  </div>`;
}

// Validates any external http(s) URL — used for social profile links
function validExternalUrl(u) {
  if (!u) return null;
  try {
    const url = new URL(u);
    if (url.protocol !== 'http:' && url.protocol !== 'https:') return null;
    return url.toString();
  } catch { return null; }
}

function buildRateCard(kit) {
  const rates = Array.isArray(kit.rate_card) ? kit.rate_card : [];
  const valid = rates.filter(r => {
    const p = parseFloat(r.price);
    return isFinite(p) && p > 0;
  });
  if (valid.length === 0) return '';

  return `<div class="section">
    <div class="section-title">Rate Card</div>
    ${valid.map(r => {
      const label = PREDEFINED_RATES[r.id] || r.label || 'Custom';
      return `<div class="rate-row">
        <div>
          <div class="rate-label">${esc(label)}</div>
          ${r.note ? `<div class="rate-note">${esc(r.note)}</div>` : ''}
        </div>
        <div class="rate-price">${esc(formatPrice(r.price))}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function buildContact(kit) {
  if (!kit.contact_email) return '';
  // Basic email validation
  const safeEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(kit.contact_email) ? kit.contact_email : null;
  if (!safeEmail) return '';

  const mailIcon = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 4h20a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Zm10 9.44L3.3 6H20.7L12 13.44Z"/></svg>';

  return `<div class="section">
    <div class="section-title">Contact</div>
    <a class="contact-email" href="mailto:${esc(safeEmail)}">
      ${mailIcon}
      <span>${esc(safeEmail)}</span>
    </a>
    ${kit.contact_note ? `<div class="contact-note">${esc(kit.contact_note)}</div>` : ''}
  </div>`;
}

function updateMKOgTags({ title, description, image, url }) {
  const setMeta = (property, content) => {
    if (!content) return;
    let el = document.querySelector(`meta[property="${property}"]`);
    if (!el) {
      el = document.createElement('meta');
      el.setAttribute('property', property);
      document.head.appendChild(el);
    }
    el.setAttribute('content', content);
  };
  const setName = (name, content) => {
    if (!content) return;
    let el = document.querySelector(`meta[name="${name}"]`);
    if (!el) {
      el = document.createElement('meta');
      el.setAttribute('name', name);
      document.head.appendChild(el);
    }
    el.setAttribute('content', content);
  };
  setMeta('og:title', title);
  setMeta('og:description', description);
  setMeta('og:type', 'profile');
  if (url) setMeta('og:url', url);
  if (image) {
    setMeta('og:image', image);
    setMeta('og:image:width', '800');
    setMeta('og:image:height', '800');
  }
  setName('twitter:card', image ? 'summary_large_image' : 'summary');
  setName('twitter:title', title);
  setName('twitter:description', description);
  if (image) setName('twitter:image', image);
  setName('description', description);
}

function render(profile, kit) {
  const name = kit.display_name || profile.username;
  const username = profile.username || '';
  const title = `${name}. Media Kit | Ryxa`;
  document.title = title;
  const headshot = validImageUrl(kit.headshot_url);
  const description = kit.bio || `${name}'s creator media kit — collaborations, audience stats, and rates.`;
  updateMKOgTags({
    title: title,
    description: description,
    image: headshot,
    url: window.location.href,
  });

  // Apply theme — custom theme only honored if user is Max tier
  const isMaxTier = profile.tier === 'max';
  if (kit.theme === 'custom' && isMaxTier && kit.custom_theme) {
    applyCustomTheme(kit.custom_theme);
    document.documentElement.setAttribute('data-theme', 'custom');
  } else {
    const theme = (kit.theme === 'custom' && !isMaxTier) ? 'purple' : (kit.theme || 'purple');
    document.documentElement.setAttribute('data-theme', theme);
  }

  // Banner rule: always on for non-Pro. Pro/Max can opt out via show_branding=false.
  const isPaid = profile.tier === 'monthly' || profile.tier === 'max';
  const showBanner = !isPaid || kit.show_branding === true;

  const bannerHtml = showBanner ? `<div class="banner-wrap">
    <a class="brand-banner" href="https://www.ryxa.io"><img src="https://www.ryxa.io/logo.png" alt="Ryxa" class="brand-banner-logo"><span>Media Kit powered by <strong>Ryxa</strong></span></a>
  </div>` : '';

  document.getElementById('wrap').innerHTML = `
    <div class="top-actions">
      <button class="btn-dl" onclick="window.print()" aria-label="Download as PDF">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </button>
    </div>
    ${buildHero(kit, headshot)}
    ${buildAudience(kit)}
    ${buildRateCard(kit)}
    ${buildContact(kit)}
    ${bannerHtml}
  `;
}

// ====== Custom theme helpers (Creator Max) ======
function hexAlpha(hex, alpha) {
  const h = (hex || '#ffffff').replace('#', '');
  const bigint = parseInt(h.length === 3 ? h.split('').map(c => c + c).join('') : h, 16);
  const r = (bigint >> 16) & 255, g = (bigint >> 8) & 255, b = bigint & 255;
  return `rgba(${r},${g},${b},${alpha})`;
}

function applyCustomTheme(ct) {
  const colors = ct?.colors || {};
  const bg = colors.bg || '#07070f';
  const card = colors.card || '#161625';
  const text = colors.text || '#ffffff';
  const accent = colors.accent || '#a78bfa';

  const root = document.documentElement;
  root.style.setProperty('--bg', bg);
  root.style.setProperty('--surface', card);
  root.style.setProperty('--surface2', card);
  root.style.setProperty('--text', text);
  root.style.setProperty('--muted', hexAlpha(text, 0.65));
  root.style.setProperty('--muted2', hexAlpha(text, 0.8));
  root.style.setProperty('--border', hexAlpha(text, 0.1));
  root.style.setProperty('--accent', accent);
  root.style.setProperty('--accent2', accent);
  root.style.setProperty('--accent-glow', hexAlpha(accent, 0.3));

  if (ct.bgUrl) {
    const op = ct.bgOpacity != null ? ct.bgOpacity : 0.4;
    const darkness = 1 - op;
    let bgStyle = document.getElementById('custom-bg-style');
    if (!bgStyle) {
      bgStyle = document.createElement('style');
      bgStyle.id = 'custom-bg-style';
      document.head.appendChild(bgStyle);
    }
    bgStyle.textContent = `
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("${ct.bgUrl.replace(/"/g, '&quot;')}");
        background-size: cover;
        background-position: center;
        z-index: -2;
      }
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,${darkness.toFixed(2)});
        z-index: -1;
      }
    `;
  }
}

async function load() {
  const username = getUsername();
  if (!username) { renderNotFound(null); return; }

  // FAST PATH: server-side rendered. Skip the data fetch + render entirely.
  // The page is already painted with the creator's content; we only need to
  // track the page view (which has to happen client-side so we don't count
  // bots or CDN cache warmers as views).
  if (window._ssrHydrated && window._ssrUsername) {
    trackPageView(window._ssrUsername, 'mediakit');
    initIgAgeGenderTabs();
    return;
  }

  // FALLBACK PATH: server-side render failed or wasn't applied. Render client-side.
  const { data: profile, error: pErr } = await sb
    .from('public_profile_tiers')
    .select('user_id, username, tier, display_currency')
    .eq('username', username)
    .maybeSingle();

  if (pErr || !profile) { renderNotFound(username); return; }

  // Set creator's display currency for price formatting
  window._creatorCurrency = profile.display_currency || 'USD';

  const { data: kit, error: kErr } = await sb
    .from('media_kit')
    .select('headshot_url, display_name, handle, bio, category, socials, engagement_rate, rate_card, contact_email, contact_note, theme, show_branding, published, custom_theme')
    .eq('user_id', profile.user_id)
    .eq('published', true)
    .maybeSingle();

  if (kErr || !kit) { renderNotFound(username); return; }

  render(profile, kit);

  // Track page view (fire-and-forget, non-blocking)
  trackPageView(username, 'mediakit');
}

// Page view tracking with visitor dedup
async function trackPageView(username, pageType) {
  try {
    // Generate a visitor hash from available browser signals (no PII stored)
    let visitorHash;
    try {
      const raw = [
        navigator.userAgent || '',
        navigator.language || '',
        screen.width + 'x' + screen.height,
        new Date().getTimezoneOffset().toString()
      ].join('|');
      const msgBuf = new TextEncoder().encode(raw);
      const hashBuf = await crypto.subtle.digest('SHA-256', msgBuf);
      const hashArr = Array.from(new Uint8Array(hashBuf));
      visitorHash = hashArr.map(b => b.toString(16).padStart(2, '0')).join('');
    } catch (hashErr) {
      // Fallback if crypto.subtle is unavailable (e.g. non-HTTPS context)
      visitorHash = 'fb-' + btoa(navigator.userAgent + screen.width + screen.height).slice(0, 32);
    }

    const { error } = await sb.rpc('record_page_view', {
      p_username: username,
      p_page_type: pageType,
      p_visitor_hash: visitorHash
    });
    if (error) console.error('Page view tracking error:', error.message);
  } catch (e) {
    console.error('trackPageView failed:', e);
  }
}

// Wire the All/Male/Female tabs in the IG age-gender chart.
// SSR ships the "All" data already rendered; this just swaps in
// the male/female data when the corresponding tab is clicked.
function initIgAgeGenderTabs() {
  const mounts = document.querySelectorAll('.ig-ag-mount[data-ag-payload]');
  mounts.forEach(mount => {
    let payload;
    try { payload = JSON.parse(mount.getAttribute('data-ag-payload') || '{}'); }
    catch { return; }

    const tabsRoot = mount.parentElement && mount.parentElement.querySelector('[data-ag-tabs]');
    if (!tabsRoot) return;

    function renderBars(items) {
      if (!items || items.length === 0) {
        mount.innerHTML = '<div class="ig-demo-loading">No data for this view.</div>';
        return;
      }
      mount.innerHTML = '<div class="ig-bar-list">' +
        items.map(it =>
          '<div class="ig-bar-row">' +
            '<div class="ig-bar-label">' + escapeText(it.label) + '</div>' +
            '<div class="ig-bar-track"><div class="ig-bar-fill" style="width:' + Number(it.pct).toFixed(1) + '%"></div></div>' +
            '<div class="ig-bar-pct">' + Number(it.pct).toFixed(1) + '%</div>' +
          '</div>'
        ).join('') +
        '</div>';
    }

    tabsRoot.addEventListener('click', e => {
      const btn = e.target && e.target.closest('[data-ag-tab]');
      if (!btn) return;
      const which = btn.getAttribute('data-ag-tab'); // 'all' | 'male' | 'female'
      // Update tab visual state
      tabsRoot.querySelectorAll('.ig-demo-tab').forEach(t => t.classList.remove('is-active'));
      btn.classList.add('is-active');
      // Render the chosen dataset
      renderBars(payload[which]);
    });
  });
}

function escapeText(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

load().catch(err => {
  console.error(err);
  renderNotFound(getUsername());
});
</script>
