<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Returning to Ryxa</title>
<meta property="og:title" content="Ryxa">
<meta property="og:image" content="https://www.ryxa.io/og-image.png">
<meta name="twitter:image" content="https://www.ryxa.io/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #07070f;
    color: #f0eef8;
    font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: center;
  }
  .card { padding: 32px; max-width: 360px; display: flex; flex-direction: column; align-items: center; }
  .logo { width: 56px; height: 56px; margin-bottom: 20px; }
  h1 { font-family: "Plus Jakarta Sans", -apple-system, sans-serif; font-size: 22px; font-weight: 700; margin: 0 0 10px; color: #f0eef8; }
  p { color: #b4b2c8; font-size: 15px; line-height: 1.5; margin: 0 0 24px; }
  .btn {
    display: inline-block;
    background: #7c3aed;
    color: #ffffff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    box-shadow: 0 0 30px rgba(124,58,237,0.3);
  }
</style>
</head>
<body>
  <div class="card">
    <img src="/logo.png?v=2" alt="Ryxa" class="logo">
    <h1 id="return-title">Returning to Ryxa...</h1>
    <p id="return-body">Taking you back to the app. If nothing happens, tap the button below.</p>
    <a class="btn" id="return-btn" href="ryxa://payment-success">Open Ryxa</a>
  </div>
  <script src="/js/app-return.js"></script>
</body>
</html>
