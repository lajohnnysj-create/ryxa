<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Returning to Ryxa</title>
<meta property="og:title" content="Ryxa">
<meta property="og:image" content="https://www.ryxa.io/og-image.png">
<meta name="twitter:image" content="https://www.ryxa.io/og-image.png">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f1a;
    color: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-align: center;
  }
  .card { padding: 32px; max-width: 360px; }
  h1 { font-size: 22px; margin: 0 0 10px; }
  p { color: rgba(255,255,255,0.62); font-size: 15px; line-height: 1.5; margin: 0 0 24px; }
  .btn {
    display: inline-block;
    background: #2563cc;
    color: #ffffff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="card">
    <h1 id="return-title">Returning to Ryxa...</h1>
    <p id="return-body">Taking you back to the app. If nothing happens, tap the button below.</p>
    <a class="btn" id="return-btn" href="ryxa://payment-success">Open Ryxa</a>
  </div>
  <script src="/js/app-return.js"></script>
</body>
</html>
