<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b2ff7"></stop>
      <stop offset="100%" stop-color="#5a0ea3"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"></rect>

  <!-- Snake -->
  <path d="M256 140 
           C340 140, 360 260, 256 280 
           C160 300, 180 380, 300 380" fill="none" stroke="white" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"></path>

  <!-- Head -->
  <circle cx="256" cy="140" r="22" fill="white"></circle>

  <!-- Eye -->
  <circle cx="262" cy="135" r="6" fill="#5a0ea3"></circle>
</svg>