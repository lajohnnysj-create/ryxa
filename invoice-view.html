<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Invoice | Ryxa</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0b10;
    --surface: #14141c;
    --surface2: #1b1b26;
    --border: rgba(255,255,255,0.08);
    --text: #f5f5f7;
    --muted: rgba(255,255,255,0.55);
    --accent: #7c3aed;
    --green: #34d399;
    --amber: #fbbf24;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex; justify-content: center;
    padding: 32px 16px 64px;
  }
  .inv-shell { width: 100%; max-width: 460px; }
  .inv-head { text-align: center; margin-bottom: 22px; }
  .inv-avatar {
    width: 76px; height: 76px; border-radius: 50%; object-fit: cover;
    border: 2px solid rgba(124,58,237,0.6); display: block; margin: 0 auto 12px;
    background: var(--surface2);
  }
  .inv-avatar-fallback {
    width: 76px; height: 76px; border-radius: 50%; margin: 0 auto 12px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 700; color: #fff;
  }
  .inv-from-line { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px; font-weight: 600; }
  .inv-from-line span { color: #c4b5fd; }
  .inv-status {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 12px; border-radius: 999px; border: 1px solid var(--border); color: var(--muted);
  }
  .inv-status.paid { color: var(--green); border-color: rgba(52,211,153,0.35); }
  .inv-status.pending { color: var(--amber); border-color: rgba(251,191,36,0.35); }
  .inv-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 22px 20px; margin-bottom: 16px;
  }
  .inv-topline { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; gap: 10px; }
  .inv-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .inv-num { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
  .inv-logo { max-height: 44px; max-width: 120px; object-fit: contain; }
  .inv-dates { display: flex; gap: 18px; font-size: 12.5px; color: var(--muted); margin-bottom: 18px; flex-wrap: wrap; }
  .inv-dates strong { color: var(--text); font-weight: 500; }
  .inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .inv-party-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
  .inv-party-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; overflow-wrap: break-word; }
  .inv-party-detail { font-size: 12px; color: var(--muted); line-height: 1.5; overflow-wrap: break-word; white-space: pre-line; }
  .inv-items { border-top: 1px solid var(--border); }
  .inv-item-row { display: flex; justify-content: space-between; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13.5px; }
  .inv-item-desc { flex: 1; overflow-wrap: break-word; min-width: 0; }
  .inv-item-qty { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .inv-item-amt { font-weight: 500; white-space: nowrap; }
  .inv-totals { padding-top: 14px; }
  .inv-total-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); padding: 3px 0; }
  .inv-total-row.grand { font-size: 17px; color: var(--text); font-weight: 700; padding-top: 10px; font-family: 'Plus Jakarta Sans', sans-serif; }
  .inv-notes { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); font-size: 12.5px; color: var(--muted); line-height: 1.55; white-space: pre-line; overflow-wrap: break-word; }
  .inv-pay-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 18px 20px; margin-bottom: 16px;
  }
  .inv-pay-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .inv-pay-method { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .inv-pay-details { font-size: 13.5px; color: #c4b5fd; overflow-wrap: break-word; white-space: pre-line; }
  .inv-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 13px 20px; border-radius: 12px; border: none; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 14.5px; font-weight: 600;
    transition: filter 0.15s, background 0.15s;
  }
  .inv-btn-download {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
  }
  .inv-btn-download:hover { background: rgba(255,255,255,0.08); }
  .inv-loading, .inv-error { text-align: center; color: var(--muted); font-size: 14px; padding: 60px 0; }
  .inv-spin {
    width: 28px; height: 28px; margin: 0 auto 14px; border-radius: 50%;
    border: 3px solid rgba(124,58,237,0.25); border-top-color: var(--accent);
    animation: invspin 0.9s linear infinite;
  }
  @keyframes invspin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="inv-shell">
    <div id="inv-loading" class="inv-loading"><div class="inv-spin"></div>Loading invoice...</div>
    <div id="inv-error" class="inv-error" style="display:none;">This invoice could not be found.<br>The link may be incorrect or the invoice was removed.</div>
    <div id="inv-content" style="display:none;">
      <div class="inv-head">
        <img id="pv-avatar" class="inv-avatar" alt="" style="display:none;">
        <div id="pv-avatar-fallback" class="inv-avatar-fallback" style="display:none;"></div>
        <div class="inv-from-line">Invoice from <span id="pv-username"></span></div>
        <div id="pv-status" class="inv-status"></div>
      </div>

      <div class="inv-card">
        <div class="inv-topline">
          <div>
            <div class="inv-title">Invoice</div>
            <div id="pv-number" class="inv-num"></div>
          </div>
          <img id="pv-logo" class="inv-logo" alt="" style="display:none;">
        </div>
        <div class="inv-dates">
          <div>Issued <strong id="pv-issued"></strong></div>
          <div id="pv-due-wrap" style="display:none;">Due <strong id="pv-due"></strong></div>
        </div>
        <div class="inv-parties">
          <div>
            <div class="inv-party-label">From</div>
            <div id="pv-from-name" class="inv-party-name"></div>
            <div id="pv-from-detail" class="inv-party-detail"></div>
          </div>
          <div>
            <div class="inv-party-label">Bill To</div>
            <div id="pv-to-name" class="inv-party-name"></div>
            <div id="pv-to-detail" class="inv-party-detail"></div>
          </div>
        </div>
        <div id="pv-items" class="inv-items"></div>
        <div class="inv-totals">
          <div class="inv-total-row"><span>Subtotal</span><span id="pv-subtotal"></span></div>
          <div class="inv-total-row" id="pv-tax-row" style="display:none;"><span id="pv-tax-label">Tax</span><span id="pv-tax"></span></div>
          <div class="inv-total-row grand"><span>Total</span><span id="pv-total"></span></div>
        </div>
        <div id="pv-notes" class="inv-notes" style="display:none;"></div>
      </div>

      <div id="pv-pay-card" class="inv-pay-card" style="display:none;">
        <div class="inv-pay-label">Payment</div>
        <div id="pv-pay-method" class="inv-pay-method"></div>
        <div id="pv-pay-details" class="inv-pay-details"></div>
      </div>

      <button id="pv-download" class="inv-btn inv-btn-download">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download Invoice
      </button>
    </div>
  </div>

<script>
(function () {
  var SUPABASE_URL = 'https://kjytapcgxukalwsyputk.supabase.co';
  var ANON_KEY = 'sb_publishable_PLU28Un_GfsUXeUsK3zB9Q_hvNM7aeG';

  var inv = null;

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function money(cents) {
    var n = (Number(cents) || 0) / 100;
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtDate(d) {
    if (!d) return '';
    var dt = new Date(d + 'T12:00:00Z');
    if (isNaN(dt)) return d;
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function publicIdFromPath() {
    var parts = window.location.pathname.split('/').filter(Boolean);
    // /invoice/<public_id>
    if (parts.length >= 2 && parts[0] === 'invoice') return parts[1];
    return '';
  }

  function show(id) { var el = document.getElementById(id); if (el) el.style.display = ''; }
  function hide(id) { var el = document.getElementById(id); if (el) el.style.display = 'none'; }

  function render(data) {
    inv = data;

    // Header: avatar + username
    var avatar = data.avatar_url || '';
    var uname = data.username || 'Creator';
    if (avatar) {
      var img = document.getElementById('pv-avatar');
      img.src = avatar;
      img.style.display = '';
      img.onerror = function () { img.style.display = 'none'; showFallback(uname); };
    } else {
      showFallback(uname);
    }
    document.getElementById('pv-username').textContent = '@' + uname;

    // Status badge
    var st = document.getElementById('pv-status');
    var status = data.status || 'draft';
    st.textContent = status === 'paid' ? 'Paid' : (status === 'pending' ? 'Payment pending' : 'Draft');
    st.className = 'inv-status ' + status;

    // Invoice card
    document.getElementById('pv-number').textContent = data.invoice_number ? ('#' + data.invoice_number) : '';
    if (data.logo_url) {
      var lg = document.getElementById('pv-logo');
      lg.src = data.logo_url;
      lg.style.display = '';
      lg.onerror = function () { lg.style.display = 'none'; };
    }
    document.getElementById('pv-issued').textContent = fmtDate(data.issue_date) || '\u2014';
    if (data.due_date) {
      document.getElementById('pv-due').textContent = fmtDate(data.due_date);
      show('pv-due-wrap');
    }

    document.getElementById('pv-from-name').textContent = data.from_name || '';
    document.getElementById('pv-from-detail').textContent =
      [data.from_email, data.from_address].filter(Boolean).join('\n');
    document.getElementById('pv-to-name').textContent = data.to_name || '';
    document.getElementById('pv-to-detail').textContent =
      [data.to_email, data.to_address].filter(Boolean).join('\n');

    // Items
    var items = Array.isArray(data.items) ? data.items : [];
    document.getElementById('pv-items').innerHTML = items.map(function (it) {
      var qty = Number(it.qty) || 0;
      var rate = Number(it.rate) || 0;
      var amt = Math.round(qty * rate * 100);
      return '<div class="inv-item-row">' +
        '<div class="inv-item-desc">' + esc(it.desc || 'Service') +
          (qty !== 1 ? '<div class="inv-item-qty">Qty ' + esc(qty) + ' \u00d7 ' + money(Math.round(rate * 100)) + '</div>' : '') +
        '</div>' +
        '<div class="inv-item-amt">' + money(amt) + '</div>' +
      '</div>';
    }).join('');

    // Totals
    document.getElementById('pv-subtotal').textContent = money(data.subtotal_cents);
    var taxPct = Number(data.tax_pct) || 0;
    if (taxPct > 0) {
      document.getElementById('pv-tax-label').textContent = 'Tax (' + taxPct + '%)';
      document.getElementById('pv-tax').textContent = money((data.total_cents || 0) - (data.subtotal_cents || 0));
      show('pv-tax-row');
    }
    document.getElementById('pv-total').textContent = money(data.total_cents);

    if (data.notes) {
      document.getElementById('pv-notes').textContent = data.notes;
      show('pv-notes');
    }

    // Payment section (manual methods; card checkout arrives in a later update)
    var method = data.payment_method || 'none';
    if ((method === 'zelle' || method === 'venmo' || method === 'other') && data.payment_details) {
      var label = method === 'zelle' ? 'Pay via Zelle' : method === 'venmo' ? 'Pay via Venmo' : 'Payment instructions';
      document.getElementById('pv-pay-method').textContent = label;
      document.getElementById('pv-pay-details').textContent = data.payment_details;
      show('pv-pay-card');
    }

    hide('inv-loading');
    show('inv-content');
    document.title = 'Invoice from @' + uname + ' | Ryxa';
  }

  function showFallback(uname) {
    var fb = document.getElementById('pv-avatar-fallback');
    fb.textContent = (uname[0] || 'C').toUpperCase();
    fb.style.display = 'flex';
  }

  // Watermark-free print/download document
  function downloadInvoice() {
    if (!inv) return;
    var items = Array.isArray(inv.items) ? inv.items : [];
    var rows = items.map(function (it) {
      var qty = Number(it.qty) || 0;
      var rate = Number(it.rate) || 0;
      return '<tr><td>' + esc(it.desc || 'Service') + '</td><td style="text-align:center;">' + esc(qty) + '</td>' +
        '<td style="text-align:right;">' + money(Math.round(rate * 100)) + '</td>' +
        '<td style="text-align:right;">' + money(Math.round(qty * rate * 100)) + '</td></tr>';
    }).join('');
    var taxPct = Number(inv.tax_pct) || 0;
    var taxCents = (inv.total_cents || 0) - (inv.subtotal_cents || 0);
    var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Invoice ' + esc(inv.invoice_number || '') + '</title>' +
      '<style>body{font-family:Arial,sans-serif;background:#fff;color:#111;margin:0;padding:40px;}' +
      '.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:48px;}' +
      '.invoice-title{font-size:36px;font-weight:900;letter-spacing:-1px;}' +
      '.invoice-num{font-size:14px;color:#666;margin-top:4px;}' +
      '.parties{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:40px;}' +
      '.party-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:#555;font-weight:700;margin-bottom:8px;}' +
      '.party-name{font-size:16px;font-weight:700;margin-bottom:4px;}' +
      '.party-detail{font-size:13px;color:#555;line-height:1.5;white-space:pre-line;}' +
      'table{width:100%;border-collapse:collapse;margin-bottom:24px;}' +
      'th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:#666;border-bottom:2px solid #f0f0f0;}' +
      'td{padding:12px;font-size:14px;border-bottom:1px solid #f5f5f5;}' +
      '.totals{margin-left:auto;width:260px;font-size:14px;}' +
      '.totals .row{display:flex;justify-content:space-between;padding:6px 0;color:#555;}' +
      '.totals .grand{font-size:20px;font-weight:800;color:#111;border-top:2px solid #eee;padding-top:10px;margin-top:6px;}' +
      '.notes{margin-top:32px;font-size:13px;color:#555;line-height:1.6;white-space:pre-line;}' +
      '@media print{body{padding:24px;}}</style></head><body>' +
      '<div class="header"><div>' +
        (inv.logo_url ? '<img src="' + esc(inv.logo_url) + '" alt="" style="max-height:60px;max-width:160px;object-fit:contain;display:block;margin-bottom:8px;">' : '') +
        '<div class="invoice-title">INVOICE</div>' +
        (inv.invoice_number ? '<div class="invoice-num">#' + esc(inv.invoice_number) + '</div>' : '') +
      '</div><div style="text-align:right;font-size:13px;color:#555;">' +
        (inv.issue_date ? 'Issued: ' + esc(fmtDate(inv.issue_date)) + '<br>' : '') +
        (inv.due_date ? 'Due: ' + esc(fmtDate(inv.due_date)) : '') +
      '</div></div>' +
      '<div class="parties"><div><div class="party-label">From</div><div class="party-name">' + esc(inv.from_name || '') + '</div>' +
        '<div class="party-detail">' + esc([inv.from_email, inv.from_address].filter(Boolean).join('\n')) + '</div></div>' +
      '<div><div class="party-label">Bill To</div><div class="party-name">' + esc(inv.to_name || '') + '</div>' +
        '<div class="party-detail">' + esc([inv.to_email, inv.to_address].filter(Boolean).join('\n')) + '</div></div></div>' +
      '<table><thead><tr><th>Description</th><th style="text-align:center;">Qty</th><th style="text-align:right;">Rate</th><th style="text-align:right;">Amount</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table>' +
      '<div class="totals"><div class="row"><span>Subtotal</span><span>' + money(inv.subtotal_cents) + '</span></div>' +
        (taxPct > 0 ? '<div class="row"><span>Tax (' + taxPct + '%)</span><span>' + money(taxCents) + '</span></div>' : '') +
        '<div class="row grand"><span>Total</span><span>' + money(inv.total_cents) + '</span></div></div>' +
      (inv.notes ? '<div class="notes">' + esc(inv.notes) + '</div>' : '') +
      '<script>window.onload=function(){window.print();}<\/script>' +
      '</body></html>';
    var w = window.open('', '_blank');
    if (!w) return;
    w.document.write(html);
    w.document.close();
  }

  document.getElementById('pv-download').addEventListener('click', downloadInvoice);

  // Fetch and render
  var pid = publicIdFromPath();
  if (!pid) {
    hide('inv-loading'); show('inv-error');
    return;
  }
  fetch(SUPABASE_URL + '/rest/v1/rpc/get_public_invoice', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': ANON_KEY,
      'Authorization': 'Bearer ' + ANON_KEY
    },
    body: JSON.stringify({ p_public_id: pid })
  })
  .then(function (r) { return r.json(); })
  .then(function (data) {
    if (!data || typeof data !== 'object' || data.message) {
      hide('inv-loading'); show('inv-error');
      return;
    }
    render(data);
  })
  .catch(function () {
    hide('inv-loading'); show('inv-error');
  });
})();
</script>
</body>
</html>
