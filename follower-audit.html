<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="shortcut icon" href="favicon.svg">
<title>Dashboard — FindTheSnakes</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

  :root {
    --bg: #07070f;
    --surface: #0f0f1a;
    --surface2: #161625;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --accent: #7c3aed;
    --accent2: #a855f7;
    --accent-glow: rgba(124,58,237,0.3);
    --gold: #f5c842;
    --text: #f0eef8;
    --muted: #7a788f;
    --muted2: #3d3b52;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 48px;
    background: rgba(10,10,15,0.8); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo {
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px;
    letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px;
  }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; }
  .nav-links { display: flex; gap: 36px; }
  .nav-links a { color: var(--muted); font-size: 14px; text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }
  .nav-right { display: flex; align-items: center; gap: 12px; position: relative; z-index: 201; }
  .nav-user { font-size: 13px; color: var(--muted); }
  .nav-user span { color: var(--text); font-weight: 500; }
  .nav-cta {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 10px 22px; font-size: 14px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s;
  }
  .nav-cta:hover { background: #f05570; transform: translateY(-1px); }
  .nav-cta.ghost {
    background: transparent; border: 1px solid var(--border-hover); color: var(--muted);
  }
  .nav-cta.ghost:hover { color: var(--text); background: rgba(255,255,255,0.04); transform: none; }

  /* ── HERO ── */
  .hero {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 120px 24px 80px; position: relative; text-align: center; overflow: hidden;
  }
  .hero-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
  .hero-bg::before {
    content: ''; position: absolute; top: -20%; left: 50%; transform: translateX(-50%);
    width: 900px; height: 900px;
    background: radial-gradient(ellipse, rgba(232,68,90,0.12) 0%, transparent 70%); border-radius: 50%;
  }
  .grid-lines {
    position: absolute; inset: 0; pointer-events: none;
    background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 64px 64px;
    mask-image: radial-gradient(ellipse at 50% 40%, black 0%, transparent 70%);
  }
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid rgba(232,68,90,0.4); background: rgba(232,68,90,0.08);
    border-radius: 100px; padding: 6px 16px; font-size: 12px;
    color: #ff8fa0; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
    margin-bottom: 32px; animation: fadeUp 0.6s ease both;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  .hero h1 {
    font-family: 'Syne', sans-serif; font-size: clamp(44px, 7vw, 86px);
    font-weight: 800; line-height: 1.0; letter-spacing: -2px; max-width: 820px;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .hero h1 em { font-style: normal; color: var(--accent); }
  .hero h1 .line2 { display: block; color: var(--muted); font-weight: 700; }
  .hero-sub {
    max-width: 480px; font-size: 17px; line-height: 1.65; color: var(--muted);
    margin-top: 24px; font-weight: 300; animation: fadeUp 0.6s 0.2s ease both;
  }
  .hero-actions {
    display: flex; gap: 14px; margin-top: 40px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .btn-primary {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 16px 34px; font-size: 16px; font-weight: 500;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.25s;
    box-shadow: 0 0 40px rgba(232,68,90,0.3);
  }
  .btn-primary:hover { background: #f05570; transform: translateY(-2px); box-shadow: 0 0 60px rgba(232,68,90,0.4); }
  .btn-secondary {
    background: transparent; color: var(--text); border: 1px solid var(--border-hover);
    border-radius: 10px; padding: 16px 34px; font-size: 16px; font-weight: 400;
    font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.25s;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.04); }
  .hero-stat-row { display: flex; gap: 48px; margin-top: 56px; animation: fadeUp 0.6s 0.4s ease both; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

  /* ── FEATURES ── */
  .section { padding: 100px 48px; max-width: 1200px; margin: 0 auto; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .section-title { font-family: 'Syne', sans-serif; font-size: clamp(32px, 4vw, 52px); font-weight: 800; letter-spacing: -1.5px; line-height: 1.1; max-width: 560px; margin-bottom: 64px; }
  .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: var(--border); border-radius: 16px; overflow: hidden; }
  .feat { background: var(--surface); padding: 40px 36px; transition: background 0.2s; position: relative; overflow: hidden; }
  .feat:hover { background: var(--surface2); }
  .feat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(232,68,90,0.4), transparent); opacity: 0; transition: opacity 0.3s; }
  .feat:hover::before { opacity: 1; }
  .feat-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(232,68,90,0.12); border: 1px solid rgba(232,68,90,0.2); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; font-size: 22px; }
  .feat h3 { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 12px; }
  .feat p { font-size: 14px; line-height: 1.7; color: var(--muted); font-weight: 300; }

  /* ── HOW IT WORKS ── */
  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; position: relative; }
  .steps::before { content: ''; position: absolute; top: 32px; left: 15%; right: 15%; height: 1px; background: linear-gradient(90deg, transparent, var(--border-hover), transparent); }
  .step { padding: 32px 32px 0; text-align: center; }
  .step-num { width: 64px; height: 64px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border-hover); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin: 0 auto 24px; position: relative; z-index: 1; }
  .step:first-child .step-num { border-color: rgba(232,68,90,0.4); color: var(--accent); background: rgba(232,68,90,0.08); }
  .step h4 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 10px; }
  .step p { font-size: 14px; color: var(--muted); line-height: 1.65; font-weight: 300; }

  /* ── TOOL SECTION ── */
  .tool-section { padding: 100px 24px; background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .tool-inner { max-width: 900px; margin: 0 auto; }
  .tool-header { text-align: center; margin-bottom: 56px; }
  .tool-header .section-title { max-width: 100%; text-align: center; margin: 0 auto 12px; }
  .tool-header p { color: var(--muted); font-size: 15px; }
  .upload-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .upload-zone {
    border: 1.5px dashed var(--muted2); border-radius: 14px; padding: 40px 28px;
    text-align: center; transition: all 0.25s; cursor: pointer;
    background: var(--bg); position: relative; overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); background: rgba(232,68,90,0.04); }
  .upload-zone input[type=file] { position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; z-index: 1; }
  .upload-icon { width: 52px; height: 52px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--border-hover); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.25s; }
  .upload-zone:hover .upload-icon { background: rgba(232,68,90,0.1); border-color: rgba(232,68,90,0.3); }
  .upload-label { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .upload-sublabel { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .upload-sublabel span { color: var(--accent); }
  .file-list { display: flex; flex-direction: column; gap: 6px; margin-top: 16px; max-height: 140px; overflow-y: scroll; text-align: left; scrollbar-width: thin; scrollbar-color: var(--muted2) transparent; position: relative; z-index: 2; }
  .file-item { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 7px; padding: 7px 12px; font-size: 12px; animation: slideIn 0.2s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateX(-8px)} to{opacity:1;transform:none} }
  .file-item-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .file-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item-size { color: var(--muted); flex-shrink: 0; }
  .file-item-remove { color: var(--muted); cursor: pointer; flex-shrink: 0; padding: 2px; border-radius: 4px; line-height: 1; transition: color 0.15s; }
  .file-item-remove:hover { color: var(--accent); }
  .analyze-btn {
    width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none;
    border-radius: 12px; font-size: 17px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.25s; box-shadow: 0 0 50px rgba(232,68,90,0.25); position: relative; overflow: hidden;
  }
  .analyze-btn:hover { background: #f05570; transform: translateY(-2px); box-shadow: 0 0 70px rgba(232,68,90,0.4); }
  .analyze-btn:disabled { background: var(--muted2); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }
  .analyze-btn.processing { background: #b8334a; cursor: not-allowed; transform: none; box-shadow: 0 0 30px rgba(232,68,90,0.15); }
  .analyze-btn.processing::after { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }
  .processing-dots::after { content: '.'; animation: dots 1.2s steps(1) infinite; }
  .error-box { background: rgba(232,68,90,0.08); border: 1px solid rgba(232,68,90,0.25); border-radius: 10px; padding: 14px 18px; font-size: 14px; color: #ff8fa0; margin-top: 16px; display: none; }

  /* ── RESULTS ── */
  #results { display: none; margin-top: 36px; }
  .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .results-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
  .results-badge { display: none; align-items: center; gap: 6px; background: rgba(232,68,90,0.1); border: 1px solid rgba(232,68,90,0.3); color: #ff8fa0; border-radius: 100px; padding: 4px 14px; font-size: 13px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
  .stat-card .num { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; line-height: 1; }
  .stat-card.danger .num { color: var(--accent); }
  .stat-card.safe .num { color: #4ade80; }
  .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .search-input { width: 100%; padding: 12px 18px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; margin-bottom: 12px; transition: border-color 0.2s; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted2); }
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .filter-tab { padding: 6px 16px; border-radius: 100px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
  .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-tab:hover:not(.active) { border-color: var(--border-hover); color: var(--text); }
  .filter-tab.wl-locked { opacity: 0.45; cursor: not-allowed; }
  .filter-tab.wl-locked:hover { border-color: var(--border); color: var(--muted); opacity: 0.45; }
  .results-list { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }


  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: rgba(255,255,255,0.03); }
  .result-handle a { color: var(--text); text-decoration: none; }
  .result-handle a:hover { color: var(--accent); }
  .tag { display: inline-flex; align-items: center; gap: 5px; border-radius: 100px; padding: 3px 12px; font-size: 11px; font-weight: 500; letter-spacing: 0.03em; }
  .tag.unfollow { background: rgba(232,68,90,0.12); color: #ff7a8f; border: 1px solid rgba(232,68,90,0.25); }
  .tag.mutual { background: rgba(74,222,128,0.08); color: #4ade80; border: 1px solid rgba(74,222,128,0.2); }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 14px; }
  .empty-state .emoji { font-size: 36px; display: block; margin-bottom: 12px; }
  #results-list-scroll { max-height: 400px; overflow-y: auto; }
  #results-list-scroll::-webkit-scrollbar { width: 4px; }
  #results-list-scroll::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

  /* ── BLURRED ROWS ── */
  .result-item.blurred { filter: blur(5px); user-select: none; pointer-events: none; opacity: 0.6; }

  /* ── PAYWALL GATE ── */
  .paywall-gate {
    border: 1px solid rgba(232,68,90,0.3);
    border-radius: 16px;
    background: linear-gradient(160deg, rgba(232,68,90,0.06) 0%, var(--surface) 60%);
    padding: 40px 36px; text-align: center; margin-top: 4px;
    position: relative; z-index: 1;
  }
  .paywall-lock { font-size: 36px; margin-bottom: 12px; }
  .paywall-gate h3 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .paywall-gate p { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
  .paywall-count { font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .paywall-count-label { font-size: 13px; color: var(--muted); margin-bottom: 28px; text-transform: uppercase; letter-spacing: 0.06em; }
  .paywall-btns { display: flex; flex-direction: column; gap: 12px; max-width: 340px; margin: 0 auto; }
  .paywall-btn {
    width: 100%; padding: 16px 24px; border-radius: 12px;
    font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.2s; border: none;
    display: flex; align-items: center; justify-content: space-between;
  }
  .paywall-btn:hover { transform: translateY(-1px); }
  .paywall-btn.primary { background: var(--accent); color: #fff; box-shadow: 0 0 30px rgba(232,68,90,0.25); }
  .paywall-btn.primary:hover { background: #f05570; }
  .paywall-btn.secondary { background: rgba(255,255,255,0.07); color: var(--text); border: 1px solid var(--border-hover); }
  .paywall-btn.secondary:hover { background: rgba(255,255,255,0.12); }
  .paywall-btn-price { font-size: 13px; opacity: 0.8; }


  /* ── AUTH SPINNER ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .auth-spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 8px;
  }

  /* ── AUTH MODAL ── */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.8);
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .modal-backdrop.open { pointer-events: all; display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border-hover);
    border-radius: 20px; padding: 40px; width: 420px; max-width: 95vw;
    position: relative; animation: modalIn 0.25s ease;
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:none} }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .modal-close:hover { background: rgba(255,255,255,0.07); color: var(--text); }
  .modal h2 { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 6px; }
  .modal-sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }
  .modal-input {
    width: 100%; padding: 13px 16px; background: var(--bg);
    border: 1px solid var(--border-hover); border-radius: 10px;
    color: var(--text); font-size: 15px; font-family: 'DM Sans', sans-serif;
    outline: none; transition: border-color 0.2s; margin-bottom: 12px; display: block;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--muted2); }
  .modal-btn {
    width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .modal-btn:hover { background: #f05570; }
  .modal-btn:disabled { background: var(--muted2); cursor: not-allowed; }
  .modal-switch { font-size: 13px; color: var(--muted); text-align: center; margin-top: 18px; }
  .modal-switch a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .modal-switch a:hover { text-decoration: underline; }
  .modal-msg { font-size: 13px; border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; display: none; }
  .modal-msg.error { background: rgba(232,68,90,0.1); color: #ff8fa0; border: 1px solid rgba(232,68,90,0.25); }
  .modal-msg.success { background: rgba(74,222,128,0.1); color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }

  /* ── PRICING ── */
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 900px; margin: 0 auto; }
  .plan { border: 1px solid var(--border); border-radius: 16px; padding: 36px; background: var(--surface); transition: border-color 0.2s; }
  .plan:hover { border-color: var(--border-hover); }
  .plan.featured { border-color: rgba(232,68,90,0.4); background: linear-gradient(160deg, rgba(232,68,90,0.06) 0%, var(--surface) 60%); position: relative; }
  .plan-badge { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; border-radius: 100px; padding: 4px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
  .plan-badge.blue { background: #1d6fb5; box-shadow: 0 0 20px rgba(29,111,181,0.4); }
  .plan-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── HAMBURGER MENU ── */

  /* ── UNFOLLOWER LOG ── */

  .log-list { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .log-header-row { display: grid; grid-template-columns: 1fr 140px 140px 100px; padding: 10px 18px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface2); }
  .log-item { display: grid; grid-template-columns: 1fr 140px 140px 100px; align-items: center; padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 13px; transition: background 0.15s; }

  /* ── SNAKE LIST ── */

    background: none; border: none; cursor: pointer;

  .snake-list-header { display: grid; grid-template-columns: 1fr 160px 36px; padding: 10px 20px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--border); background: var(--surface2); }
